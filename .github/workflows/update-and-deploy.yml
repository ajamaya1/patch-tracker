name: Update CVE data & deploy

# Refresh the security feeds and republish the dashboard.
#
#  * Daily 06:17 UTC  -> catches Apple (SOFA) releases and newly
#    exploited CVEs, which can land any day.
#  * Patch Tuesday    -> Microsoft (MSRC) ships monthly on the second
#    Tuesday. The cron "0 18 8-14 * 2" fires on the Tuesday whose date is
#    8-14, i.e. exactly the second Tuesday, ~10:00 PT after the release.
on:
  schedule:
    - cron: "17 6 * * *"      # daily, all sources
    - cron: "0 18 8-14 * 2"   # Patch Tuesday, Microsoft focus
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "web/**"
      - "src/**"
      - ".github/workflows/**"

# Allow committing refreshed data and deploying to Pages.
permissions:
  contents: write
  pages: write
  id-token: write

# Never run two deploys at once; let an in-flight run finish.
concurrency:
  group: patch-tracker-pages
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # full history so we can rebase before pushing

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: pip install -e .

      # Stateless: the DB is rebuilt fresh each run (recency derives from each
      # feed's own dates), so nothing is persisted in git. Fetch each vendor
      # independently so one feed outage can't blank the whole board.
      - name: Fetch Apple (SOFA)
        continue-on-error: true
        run: patch-tracker --db /tmp/pt.db fetch --source apple --ios

      - name: Fetch Microsoft (latest Patch Tuesday)
        continue-on-error: true
        run: patch-tracker --db /tmp/pt.db fetch --source microsoft --months 1

      - name: Fetch third-party zero-days (CISA KEV, last 90d)
        continue-on-error: true
        run: patch-tracker --db /tmp/pt.db fetch --source kev --kev-days 90

      - name: Fetch third-party advisories (NVD — Adobe, Cisco, …, last 30d)
        continue-on-error: true
        run: patch-tracker --db /tmp/pt.db fetch --source nvd --nvd-days 30

      # --fail-if-empty keeps the last good Pages deploy if every feed is down.
      - name: Build dashboard data (last ~30 days + latest MS monthly)
        run: patch-tracker --db /tmp/pt.db build-site --out web/data.json --new-days 7 --window-days 30 --fail-if-empty

      # Cache-bust the JS/CSS so browsers always get the freshly deployed code
      # (otherwise GitHub Pages' CDN serves stale assets after a change).
      - name: Version static assets
        run: |
          v="${GITHUB_SHA::8}"
          sed -i "s#href=\"styles.css\"#href=\"styles.css?v=${v}\"#" web/index.html
          sed -i "s#src=\"app.js\"#src=\"app.js?v=${v}\"#" web/index.html
          grep -o 'styles.css?v=[0-9a-f]*' web/index.html || true

      # Capture the Pages artifact BEFORE committing, so the deploy never
      # depends on the data commit succeeding.
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web

      # Persist data/patches.db + web/data.json back to main. Concurrent runs
      # (or manual pushes) can move main underneath us, so rebase our freshly
      # generated files on top of the latest main and retry. "ours wins" — this
      # run's data is the newest — which sidesteps binary-DB merge conflicts.
      - name: Commit refreshed data
        continue-on-error: true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          for i in 1 2 3 4 5; do
            git fetch origin main
            git reset --soft origin/main
            git add web/data.json
            if git diff --staged --quiet; then
              echo "No CVE changes since last run."; exit 0
            fi
            git commit -m "data: refresh security feeds ($(date -u +%Y-%m-%d))"
            if git push origin HEAD:main; then
              echo "Pushed refreshed data."; exit 0
            fi
            echo "main moved; rebasing and retrying (attempt $i)…"
            sleep $((i * 3))
          done
          echo "::warning::Could not push refreshed data after retries; the deploy still uses the freshly built artifact."

  deploy:
    needs: update
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
