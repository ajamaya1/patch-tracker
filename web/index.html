<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Patch Tracker — Apple &amp; Microsoft security updates</title>
  <meta name="description"
        content="Daily-updated dashboard of Apple (SOFA) and Microsoft (MSRC) security patches and CVEs." />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <h1>🛡️ Patch Tracker</h1>
      <div class="updated" id="updated">Loading…</div>
    </div>
    <p class="subtitle">
      Apple (SOFA) &amp; Microsoft (MSRC) security updates, refreshed daily by
      GitHub Actions.
    </p>
  </header>

  <main class="container">
    <section class="cards" id="stats" aria-label="Summary statistics"></section>

    <div class="sticky-filters">
    <section class="controls" aria-label="Filters">
      <input type="search" id="search" placeholder="Search title / product…"
             autocomplete="off" />
      <input type="search" id="cve" placeholder="CVE id…" autocomplete="off" />
      <select id="source">
        <option value="">All sources</option>
        <option value="apple">Apple</option>
        <option value="microsoft">Microsoft</option>
        <option value="cisa-kev">Third-party (CISA KEV)</option>
      </select>
      <select id="platform" title="Platform / vendor">
        <option value="">All platforms</option>
      </select>
      <select id="affected" title="Windows client vs server">
        <option value="">Client + server</option>
        <option value="client">Windows client</option>
        <option value="server">Windows server</option>
      </select>
      <select id="severity" title="Minimum severity">
        <option value="">Any severity</option>
        <option value="critical">Critical</option>
        <option value="important">Important+</option>
        <option value="moderate">Moderate+</option>
        <option value="low">Low+</option>
      </select>
      <input type="number" id="cvss" min="0" max="10" step="0.1"
             placeholder="Min CVSS" class="num-input" />
      <label class="check">
        <input type="checkbox" id="exploited" /> Exploited only
      </label>
      <label class="check">
        <input type="checkbox" id="newonly" /> New only
      </label>
      <button type="button" id="reset" class="btn-ghost">Reset</button>
    </section>

    <section class="toolbar" aria-label="Export">
      <span class="count" id="resultcount"></span>
      <span class="export-group">
        <span class="export-label">Export filtered:</span>
        <button type="button" class="btn" data-export="csv">CSV</button>
        <button type="button" class="btn" data-export="json">JSON</button>
        <button type="button" class="btn" data-export="html">HTML</button>
      </span>
    </section>
    </div>

    <section id="list" class="list" aria-live="polite"></section>
    <p id="empty" class="empty" hidden>No patches match your filters.</p>
  </main>

  <footer class="footer">
    <span id="footer-meta"></span>
    <a href="https://github.com/ajamaya1/patch-tracker">Source on GitHub</a>
  </footer>

  <script src="app.js"></script>
</body>
</html>
