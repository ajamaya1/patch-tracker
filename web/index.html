<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'none'; script-src 'self'; style-src 'self'; img-src 'self' data:; connect-src 'self'; base-uri 'none'; form-action 'none'; frame-ancestors 'none'" />
  <meta name="referrer" content="no-referrer" />
  <title>Patch Tracker — vulnerability triage</title>
  <meta name="description"
        content="Risk-ranked Apple, Microsoft and third-party security patches with remediation guidance, refreshed daily." />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <span class="brand-mark" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2.5 4 5.5v6c0 5 3.4 8.6 8 10 4.6-1.4 8-5 8-10v-6L12 2.5Z"/>
            <path d="M9 12.2l2 2 4-4.4"/>
          </svg>
        </span>
        <span class="brand-text">Patch Tracker<small>Vulnerability Management</small></span>
      </div>

      <nav class="views" id="views" aria-label="Views"></nav>

      <div class="side-foot">
        <div class="legend">
          <div class="legend-title">Feed health</div>
          <div id="legend"></div>
        </div>
        <div class="updated" id="updated">Loading…</div>
        <div class="provenance" id="provenance"></div>
      </div>
    </aside>

    <main class="main">
      <header class="main-head">
        <div class="head-title">
          <h1 id="view-title">Priority queue</h1>
          <p id="view-desc" class="muted"></p>
        </div>
        <div class="head-actions">
          <span class="export-label">Export view</span>
          <button class="btn" data-export="csv">CSV</button>
          <button class="btn" data-export="json">JSON</button>
          <button class="btn" data-export="html">HTML</button>
        </div>
      </header>

      <section class="kpis" id="kpis" aria-label="Risk summary"></section>

      <section class="toolbar" aria-label="Filters">
        <input type="search" id="search" placeholder="Search title / product…" autocomplete="off" />
        <input type="search" id="cve" placeholder="CVE id…" autocomplete="off" />
        <select id="affected" title="Windows client vs server">
          <option value="">All (client &amp; server)</option>
          <option value="client">Windows client</option>
          <option value="server">Windows server</option>
          <option value="both">Affects both</option>
        </select>
        <select id="severity" title="Minimum severity">
          <option value="">Any severity</option>
          <option value="critical">Critical</option>
          <option value="important">High+</option>
          <option value="moderate">Medium+</option>
          <option value="low">Low+</option>
        </select>
        <input type="number" id="cvss" min="0" max="10" step="0.1" placeholder="Min CVSS" class="num-input" />
        <label class="check"><input type="checkbox" id="exploited" /> Exploited</label>
        <label class="check"><input type="checkbox" id="newonly" /> New</label>
        <select id="sort" title="Sort by">
          <option value="priority">Sort: Priority</option>
          <option value="severity">Sort: Severity</option>
          <option value="cvss">Sort: CVSS</option>
          <option value="date">Sort: Release date</option>
          <option value="due">Sort: KEV due date</option>
        </select>
        <button type="button" id="reset" class="btn-ghost">Reset</button>
        <span class="count" id="resultcount"></span>
      </section>

      <section id="list" class="cards" aria-live="polite"></section>
      <p id="empty" class="empty" hidden>Nothing matches the current view and filters.</p>
    </main>
  </div>

  <div class="drawer-overlay" id="overlay" hidden></div>
  <aside class="drawer" id="drawer" aria-label="Patch details" hidden></aside>

  <script src="app.js"></script>
</body>
</html>
